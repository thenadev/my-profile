<!-- Inline-Grafik: KI-gestützt = schneller → fairer Preis, Qualität bleibt Premium. 1200×520. -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 520px; }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(120% 140% at 50% 0%, #0f3a3e 0%, #0f2528 60%, #06181a 100%);
        color: #eafaff; position: relative; overflow: hidden; padding: 44px 64px;
      }
      .dots { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,.07) 2px, transparent 2px); background-size: 34px 34px; opacity: .5; }
      h2 { position: relative; text-align: center; font-size: 23px; font-weight: 700; letter-spacing: .5px; color: #7fe3e8; text-transform: uppercase; margin-bottom: 40px; }
      .rows { position: relative; display: flex; flex-direction: column; gap: 32px; }
      .row { display: grid; grid-template-columns: 260px 1fr 150px; align-items: center; gap: 24px; }
      .who { font-size: 24px; font-weight: 700; }
      .who .s { display: block; font-size: 15px; font-weight: 400; color: #9fc9cc; margin-top: 3px; }
      .track { height: 46px; border-radius: 12px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); position: relative; overflow: hidden; }
      .fill { position: absolute; inset: 0; border-radius: 12px; display: flex; align-items: center; padding-left: 18px; font-size: 16px; font-weight: 700; color: #06181a; }
      .fill.slow { width: 100%; background: repeating-linear-gradient(45deg, #6b7a86, #6b7a86 14px, #5c6b77 14px, #5c6b77 28px); color: #eafaff; }
      .fill.fast { width: 42%; background: linear-gradient(90deg, #2fd6de, #1ab5bd); }
      .price { text-align: right; font-size: 30px; font-weight: 800; }
      .price.hi { color: #d98c8c; }
      .price.lo { color: #2fd6de; }
      .note { position: relative; text-align: center; margin-top: 40px; font-size: 21px; font-weight: 700; }
      .note .hl { color: #2fd6de; }
    </style>
  </head>
  <body>
    <div class="dots"></div>
    <h2>Schneller entwickelt = fairer im Preis</h2>
    <div class="rows">
      <div class="row">
        <div class="who">Klassische Agentur<span class="s">viele Rollen, Overhead</span></div>
        <div class="track"><div class="fill slow">Wochen an Fleißarbeit</div></div>
        <div class="price hi">€€€</div>
      </div>
      <div class="row">
        <div class="who">KI-gestützt · ich<span class="s">Werkzeug für Tempo</span></div>
        <div class="track"><div class="fill fast">deutlich schneller</div></div>
        <div class="price lo">€</div>
      </div>
    </div>
    <div class="note">Gleiche <span class="hl">Premium-Qualität</span> – der Zeitvorteil landet in Ihrem Preis.</div>
  </body>
</html>
