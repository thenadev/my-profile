<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; }
  body {

  /* Farb-Blobs im Markenlook */
  .blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:.55; }

  .blob2 { width:460px; height:460px; background:#1ab5bd; bottom:-200px; right:220px; opacity:.4; }
  .blob3 { width:360px; height:360px; background:#0B878E; top:120px; right:-80px; opacity:.5; }

  .dots { position:absolute; inset:0;
    background-image: radial-gradient(circle, rgba(255,255,255,.08) 1.5px, transparent 1.5px);
    background-size: 34px 34px; opacity:.4; }

  .wrap { position:relative; z-index:2; display:flex; align-items:center;
    justify-content:space-between; width:100%; height:100%; padding:0 80px; }

  .left { max-width:660px; }
  .kicker { display:inline-block; font-size:24px; font-weight:600; letter-spacing:.14em;
    text-transform:uppercase; color:#7fe3e8; margin-bottom:22px; }
  h1 { font-size:92px; line-height:1.02; font-weight:800; letter-spacing:-.02em;
    color:#ffffff; margin-bottom:26px; }
  .sub { font-size:40px; font-weight:600; line-height:1.2; color:#cdeef0; margin-bottom:34px; }
  .accent { color:#2fd6de; }
  .domain { display:inline-flex; align-items:center; gap:14px; font-size:28px;
    font-weight:600; color:#9fc9cc; }
  .domain::before { content:""; width:40px; height:4px; border-radius:2px;
    background:linear-gradient(90deg,#00B0B0,#1ab5bd); }

  .right { position:relative; flex-shrink:0; width:430px; height:560px;
    display:flex; align-items:flex-end; justify-content:center; }
  .ring { position:absolute; bottom:20px; width:400px; height:400px; border-radius:50%;
    background: radial-gradient(circle at 50% 45%, rgba(26,181,189,.55), rgba(11,135,142,.25) 55%, transparent 72%);
    filter:blur(6px); }
  .photo { position:relative; z-index:3; height:560px; width:auto;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,.55)); }
</style>
